# Déploiement front SmokingApp (Netlify)
# SPA Vite + PWA. Variables publiques VITE_* au build (clé publishable, URL
# Supabase, clé VAPID publique — toutes destinées au client, aucun secret).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_SUPABASE_URL = "https://ktxxwklxbmoobmuvnmmj.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_3ZFQQZ04lKDq78WLvNBP1Q_s8eIaIgs"
  VITE_VAPID_PUBLIC_KEY = "BO2uEbLBR8kZ4kyOEez87tNa_mgGCB7P4HtkVkNa7SVHqi8DGPvaApLZ5aVHP1T1WdTyHgWf3Xbor53b4mxklC4"

# Fallback SPA : les routes client (/compte/notifications, etc.) servent
# index.html. Netlify sert d'abord les fichiers réels (sw.js, push-sw.js,
# manifest.webmanifest, assets/*), donc ils ne sont pas capturés.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# En-têtes de sécurité (audit VICE). CSP calquée sur l'usage réel : tout est
# self-hébergé (fonts, workbox, registerSW), seules exceptions tierces =
# l'iframe YouTube-nocookie et les vignettes ytimg des tools vidéo, plus
# l'API Supabase (REST + Realtime wss). script-src reste 'self' (pas de
# inline), la vraie barrière anti-XSS.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: blob: https://i.ytimg.com; font-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src https://www.youtube-nocookie.com; worker-src 'self'; manifest-src 'self'; form-action 'self'; upgrade-insecure-requests"
